<!DOCTYPE html>
<html>
<head>
  <title>ShopFinder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" href="https://i.ibb.co/8ggt05j7/file-000000002ddc7207ac954089ca8441d9.png">

  <!-- PWA -->
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(#0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: bold;
    }

    .searchBtn { background: #22c55e; }
    .logout { background: red; }

    .logo {
      width: 90px;
      margin-bottom: 10px;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }

    /* 🔥 SPLASH SCREEN */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #020617, #020617 60%, #000);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 9999;
    }

    .scene {
      position: relative;
      width: 260px;
      height: 120px;
      margin-bottom: 20px;
    }

    .line {
      position: absolute;
      top: 55px;
      left: 20px;
      width: 200px;
      height: 2px;
      border-top: 2px dashed #22c55e;
      opacity: 0.5;
    }

    .dot {
      position: absolute;
      top: 48px;
      left: 0;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
      animation: moveDot 2.2s ease forwards;
    }

    .map {
      position: absolute;
      right: 0;
      top: 20px;
      width: 50px;
      height: 40px;
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 8px;
      box-shadow: 0 0 10px #000;
      opacity: 0;
      animation: showMap 0.5s ease forwards;
      animation-delay: 1.5s;
    }

    .pin {
      position: absolute;
      top: 8px;
      left: 18px;
      width: 14px;
      height: 14px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
    }

    .title {
      font-size: 22px;
      margin: 5px;
    }

    .sub {
      font-size: 13px;
      opacity: 0.6;
    }

    .progress {
      margin-top: 15px;
      width: 120px;
      height: 4px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar {
      width: 0%;
      height: 100%;
      background: #22c55e;
      animation: load 2.5s linear forwards;
    }

    @keyframes moveDot {
      0% { left: 0; }
      100% { left: 180px; }
    }

    @keyframes showMap {
      to { opacity: 1; transform: scale(1.05); }
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>

<body>

<!-- 🔥 SPLASH -->
<div id="splash">
  <div class="scene">
    <div class="line"></div>
    <div class="dot"></div>
    <div class="map">
      <div class="pin"></div>
    </div>
  </div>

  <h2 class="title">ShopFinder</h2>
  <p class="sub">Find any shop near you</p>

  <div class="progress">
    <div class="bar"></div>
  </div>
</div>

<div id="app"></div>

<script>
  let step = "login";
  let address = "";

  function render() {
    const app = document.getElementById("app");

    if (step === "login") {
      app.innerHTML = `
        <div class="card">
          <img src="https://i.ibb.co/8ggt05j7/file-000000002ddc7207ac954089ca8441d9.png" class="logo">
          <h2>ShopFinder</h2>
          <p class="small">Find any shop near you</p>

          <input id="addr" placeholder="Enter your address">
          <button onclick="goHome()">Continue</button>
        </div>
      `;
    }

    if (step === "home") {
      app.innerHTML = `
        <div class="card">
          <img src="https://i.ibb.co/8ggt05j7/file-000000002ddc7207ac954089ca8441d9.png" class="logo">
          <h3>Hi 👋</h3>
          <p class="small">${address}</p>

          <input id="search" placeholder="Search (medical, grocery, salon...)">

          <button class="searchBtn" onclick="search()">Search Nearby 🔍</button>
          <button class="logout" onclick="logout()">Logout</button>
        </div>
      `;
    }
  }

  function goHome() {
    address = document.getElementById("addr").value;
    if (!address) return alert("Enter address");
    step = "home";
    render();
  }

  function search() {
    const q = document.getElementById("search").value;
    if (!q) return alert("Type something");

    const text = q + " near me";
    window.open("https://www.google.com/maps/search/" + encodeURIComponent(text));
  }

  function logout() {
    step = "login";
    render();
  }

  render();

  // Splash hide
  setTimeout(() => {
    const splash = document.getElementById("splash");
    splash.style.transition = "opacity 0.5s";
    splash.style.opacity = "0";
    setTimeout(() => splash.style.display = "none", 500);
  }, 3000);

  // Service worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

</body>
  </html>
